name: "BGI PR Architecture Risk Bot"
description: "Scan a PR, compute architecture risk, and post/update a structured PR comment."
branding:
  icon: "shield"
  color: "blue"

inputs:
  github-token:
    description: "GitHub token used to create/update PR comments"
    required: false
    default: ""
  scan-path:
    description: "Repository path to scan"
    required: false
    default: "."
  language:
    description: "Scan language (use auto for multi-language repos)"
    required: false
    default: "auto"
  graph-path:
    description: "Path to write bgi graph artifact"
    required: false
    default: ".bgi/bgi-graph.json"
  fuse-graph-path:
    description: "Path to write fuse graph artifact"
    required: false
    default: ".bgi/fuse-graph.json"
  index-db-path:
    description: "Optional index DB path for stronger symbol lookup"
    required: false
    default: ""
  changed-files:
    description: "Optional newline/comma-separated changed files. If empty, derive from PR base/head."
    required: false
    default: ""
  task-prompt:
    description: "Optional implementation task prompt for twin_context enrichment"
    required: false
    default: ""
  max-files:
    description: "Maximum changed files to analyze"
    required: false
    default: "40"
  max-seams:
    description: "Maximum seams to include per file"
    required: false
    default: "8"
  impact-depth:
    description: "Depth for impact_neighbors"
    required: false
    default: "2"
  max-neighbors:
    description: "Maximum impacted units returned per file"
    required: false
    default: "40"
  post-comment:
    description: "Whether to publish/update a PR comment"
    required: false
    default: "true"

outputs:
  risk-score:
    description: "Overall risk score (0-100)"
    value: ${{ steps.out.outputs.risk_score }}
  risk-level:
    description: "Overall risk level"
    value: ${{ steps.out.outputs.risk_level }}
  changed-files-count:
    description: "Number of changed files analyzed"
    value: ${{ steps.out.outputs.changed_files_count }}
  report-path:
    description: "Path to generated markdown report"
    value: ${{ steps.out.outputs.report_path }}
  comment-url:
    description: "URL of created/updated comment (empty when not posted)"
    value: ${{ steps.out.outputs.comment_url }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Big Indexer from action source
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "${{ github.action_path }}"

    - name: Generate BGI artifacts
      shell: bash
      run: |
        mkdir -p "$(dirname "${{ inputs.graph-path }}")" "$(dirname "${{ inputs.fuse-graph-path }}")"
        bgi scan "${{ inputs.scan-path }}" \
          --lang "${{ inputs.language }}" \
          --out "${{ inputs.graph-path }}" \
          --fuse-graph "${{ inputs.fuse-graph-path }}"

    - name: Compute PR architecture risk
      id: risk
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
      run: |
        python "${{ github.action_path }}/scripts/pr_architecture_risk_bot.py" \
          --repo-root "${{ inputs.scan-path }}" \
          --graph-path "${{ inputs.graph-path }}" \
          --fuse-graph-path "${{ inputs.fuse-graph-path }}" \
          --index-db-path "${{ inputs.index-db-path }}" \
          --changed-files "${{ inputs.changed-files }}" \
          --task-prompt "${{ inputs.task-prompt }}" \
          --max-files "${{ inputs.max-files }}" \
          --max-seams "${{ inputs.max-seams }}" \
          --impact-depth "${{ inputs.impact-depth }}" \
          --max-neighbors "${{ inputs.max-neighbors }}" \
          --post-comment "${{ inputs.post-comment }}" \
          --output-json "$RUNNER_TEMP/bgi-pr-risk.json" \
          --output-markdown "$RUNNER_TEMP/bgi-pr-risk.md"

    - name: Export action outputs
      id: out
      shell: bash
      run: |
        python - <<'PY'
        import json
        import os
        from pathlib import Path

        out_file = Path(os.environ["RUNNER_TEMP"]) / "bgi-pr-risk.json"
        data = json.loads(out_file.read_text(encoding="utf-8")) if out_file.exists() else {}
        outputs = {
            "risk_score": str(data.get("risk_score", 0)),
            "risk_level": str(data.get("risk_level", "LOW")),
            "changed_files_count": str(data.get("changed_files_count", 0)),
            "report_path": str(data.get("report_path", "")),
            "comment_url": str(data.get("comment_url", "")),
        }
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            for k, v in outputs.items():
                f.write(f"{k}={v}\n")
        PY

    - name: Append report to step summary
      shell: bash
      run: |
        if [ -f "$RUNNER_TEMP/bgi-pr-risk.md" ]; then
          cat "$RUNNER_TEMP/bgi-pr-risk.md" >> "$GITHUB_STEP_SUMMARY"
        fi
