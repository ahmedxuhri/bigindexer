[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "bgi"
version = "0.1.0"
description = "Bio-Gate Indexing — language-agnostic hierarchical code intelligence"
requires-python = ">=3.10"
dependencies = [
    "tree-sitter>=0.23",
    "tree-sitter-python>=0.23",
    "tree-sitter-typescript>=0.23",
    "anthropic>=0.25",          # Position 1/2/3/4 AI — swap for any LLM
]

[project.scripts]
bgi = "bgi.cli:main"

[tool.setuptools.packages.find]
where = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"

[tool.coverage.run]
source = ["bgi"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
