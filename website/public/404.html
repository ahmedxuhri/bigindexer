<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Big Indexer</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="shortcut icon" href="/favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8f9fd;
      --text: #1f2937;
      --muted: #64748b;
      --purple: #6366f1;
      --purple-dk: #4f46e5;
      --purple-lt: #eeeffe;
      --line: #e2e8f0;
      --shadow: 0 20px 40px rgba(99, 102, 241, 0.08);
    }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.12), transparent 40%),
        radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.08), transparent 35%),
        linear-gradient(135deg, #f8f9fd 0%, #f1f5f9 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      text-align: center;
    }
    .container {
      max-width: 520px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 24px;
      padding: 3rem 2rem;
      box-shadow: var(--shadow);
    }
    .error-code {
      font-size: 6rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--purple) 0%, #4f46e5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      color: #0f172a;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    .home-btn {
      display: inline-block;
      background: linear-gradient(135deg, var(--purple) 0%, #4f46e5 100%);
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.8rem 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.25);
      transition: all 0.2s ease;
    }
    .home-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.35);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for doesn't exist, has been removed, or is temporarily unavailable.</p>
    <a href="/" class="home-btn" id="back-home-btn">Go Back Home</a>
  </div>
</body>
</html>
